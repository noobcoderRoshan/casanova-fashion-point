<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="40" height="40">
  <!-- Define gradient for gold effect -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- C circle -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Feather inside C -->
  <path d="M 60 25 Q 65 35 63 50 Q 62 60 55 68" fill="none" stroke="url(#goldGradient)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 58 28 Q 62 32 61 40" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
  <path d="M 57 40 Q 61 45 60 52" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
  <path d="M 56 55 Q 59 60 56 65" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
  
  <!-- Feather tip -->
  <circle cx="55" cy="70" r="2" fill="url(#goldGradient)"/>
</svg>
